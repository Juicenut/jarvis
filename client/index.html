<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="avatar-container">
        <!-- TalkingHead.js avatar will render here (Step 7) -->
        <div id="avatar-placeholder">JARVIS</div>
    </div>

    <div id="hud">
        <div id="status">
            <span id="status-dot"></span>
            <span id="status-label">Initializing...</span>
        </div>
        <div id="transcript"></div>
        <div id="response"></div>
    </div>

    <div id="controls">
        <button id="btn-connect">Connect</button>
        <button id="btn-wake" disabled>Activate (or say "Jarvis")</button>
    </div>

    <!-- Porcupine Web SDK (WASM wake word detection) -->
    <script src="https://unpkg.com/@picovoice/porcupine-web@3.0.3/dist/iife/index.js"></script>

    <script type="module" src="js/app.js"></script>
</body>
</html>
